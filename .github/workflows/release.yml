name: Package Mod

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read mod info
        id: info
        run: |
          NAME=$(jq -r .name info.json)
          VERSION=$(jq -r .version info.json)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "folder=${NAME}_${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create mod zip
        run: |
          FOLDER=${{ steps.info.outputs.folder }}
          mkdir "$FOLDER"
          cp info.json data-final-fixes.lua thumbnail.png "$FOLDER/"
          zip -r "${FOLDER}.zip" "$FOLDER"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.info.outputs.version }}
          FOLDER=${{ steps.info.outputs.folder }}
          TAG="v${VERSION}"

          # Delete existing release/tag if version unchanged
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            "${FOLDER}.zip" \
            --title "v${VERSION}" \
            --notes "Factorio mod package for version ${VERSION}" \
            --latest
